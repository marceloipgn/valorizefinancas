name: Gerar Artigo Automático

on:
  schedule:
    # Executa todos os dias às 09:00 UTC (06:00 horário de Brasília)
    - cron: '0 9 * * *'
  workflow_dispatch: # Permite testar e disparar manualmente quando quiser

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do Código
        uses: actions/checkout@v3

      - name: Configurar Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Executar Gerador de Artigos
        env:
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: node scripts/generate-post.js

      - name: Salvar e Publicar Alterações
        run: |
          git config --global user.name "Bot Valorize Finanças"
          git config --global user.email "bot@valorizefinancas.com"
          git add src/data/posts.json
          git commit -m "auto: novo artigo gerado via Gemini e NewsAPI" || exit 0
          git push
