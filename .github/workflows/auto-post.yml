name: Gerar Artigo Automático

on:
  schedule:
    - cron: '0 9 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do Código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Executar Gerador de Artigos
        env:
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: node scripts/generate-post.js

      - name: Salvar e Publicar Alterações
        run: |
          git config --global user.name "Bot Valorize Finanças"
          git config --global user.email "bot@valorizefinancas.com"
          git add src/data/posts.json
          git commit -m "auto: novo artigo gerado via Gemini e NewsAPI" || exit 0
          git push
